# =========================================================================
#  ADAPTIVE FLOW - MATERIAL PROFILES (SYSTEM DEFAULTS)
# =========================================================================
#  This file contains system defaults and is updated by git.
#  DO NOT EDIT THIS FILE - your changes will be overwritten on update.
#
#  To create custom material profiles, edit material_profiles_user.cfg instead.
#  Variables in material_profiles_user.cfg will override these defaults.
# =========================================================================
#
#  HEATER WATTAGE AUTO-SCALING:
#  ----------------------------
#  These defaults are tuned for a 40W heater (Revo stock). When a higher
#  wattage heater is configured (variable_heater_wattage in auto_flow_user.cfg),
#  flow_k, ramp_rise, max_boost, and speed_boost_k are AUTOMATICALLY scaled
#  at runtime by AT_INIT_MATERIAL. No manual overrides needed.
#
#  Example auto-scaled PETG values:
#    40W: flow_k=0.50, ramp_rise=3.0, max_boost=15
#    60W: flow_k=0.65, ramp_rise=3.8, max_boost=18.8
#
#  To add a custom material:
#    1. Copy any profile from this file to material_profiles_user.cfg
#    2. Rename to [gcode_macro _AF_PROFILE_YOURMATERIAL]
#    3. Adjust the values
#    4. Pass MATERIAL=YOURMATERIAL from your slicer
#
#  PARAMETER GUIDE:
#  ----------------
#  flow_k:         Temp boost per mm³/s of excess flow above gate (higher = more aggressive)
#  speed_boost_k:  Temp boost per mm/s above 100mm/s (for thin walls at speed)
#  max_boost:      Maximum temperature boost cap (°C above base)
#  max_temp:       Absolute maximum temperature limit (safety)
#  flow_gate:      Minimum flow (mm³/s) before boost activates (HF nozzle)
#  flow_gate_std:  Minimum flow (mm³/s) before boost activates (Std nozzle)
#  pa_boost_k:     PA reduction per °C of boost (viscosity compensation)
#  ramp_rise:      How fast temp can increase (°C/s)
#  ramp_fall:      How fast temp can decrease (°C/s)
#  default_pa:     Default PA if user hasn't calibrated
# =========================================================================

# =========================================================================
#  PLA - High Speed PLA profile (eSun PLA+HS and similar formulations)
# =========================================================================
#  Fast-crystallizing PLA formulated for 300mm/s+ printing. Lower viscosity
#  and faster solidification than standard PLA. Needs AGGRESSIVE cooling —
#  short layer times at high speed mean each layer must be fully set before
#  the next lands. BBL P1S runs 100% fan with 4s min layer time for this.
#
#  SAFE FLOW LIMITS (0.4mm nozzle):
#    40W heater: 12-14 mm³/s (safe), 15 (borderline), 16+ (heater saturates)
#    60W heater: 16-18 mm³/s (safe), 19 (borderline), 20+ (unstable)
#
#  RECOMMENDED BASE TEMP: 200-220°C (eSun recommends 190-220°C)
# =========================================================================
[gcode_macro _AF_PROFILE_PLA]
variable_flow_k: 0.80
variable_speed_boost_k: 0.06
variable_max_boost: 12.0
variable_max_temp: 245
variable_flow_gate: 12.0
variable_flow_gate_std: 8.0
variable_pa_boost_k: 0.0008
variable_ramp_rise: 3.0
variable_ramp_fall: 1.5
variable_default_pa: 0.024
# Min 70% ensures consistent crystallization even during heater struggle
gcode:

# =========================================================================
#  PETG - Tuned for 40W heater (Revo stock)
# =========================================================================
#  PETG is more viscous than PLA and needs more heat per mm³/s. A 40W heater
#  saturates quickly at high flow, so keep boosts modest and achievable.
#
#  SAFE FLOW LIMITS (0.4mm nozzle):
#    40W heater: 10-12 mm³/s (safe), 13 (borderline), 14+ (heater saturates)
#    60W heater: 15-18 mm³/s (safe), 19 (borderline)
#
#  Boost = (flow - gate) * flow_k (excess above gate only)
#  HF: At 16 mm³/s with gate=12, flow_k=0.50: boost = 2°C
#  Std: At 12 mm³/s with gate=8, flow_k=0.50: boost = 2°C
#
#  RECOMMENDED SLICER SPEEDS (0.2mm layers, 0.4mm nozzle, 40W):
#    Outer wall: 120 mm/s (9.6 mm³/s)
#    Inner wall: 150 mm/s (12 mm³/s)
#    Infill: 180 mm/s (quality doesn't matter)
#    Top surface: 60 mm/s
#
#  RECOMMENDED BASE TEMP: 240-245°C
# =========================================================================
[gcode_macro _AF_PROFILE_PETG]
variable_flow_k: 0.50
variable_speed_boost_k: 0.06
variable_max_boost: 15.0
variable_max_temp: 280
variable_flow_gate: 12.0
variable_flow_gate_std: 8.0
variable_pa_boost_k: 0.0008
variable_ramp_rise: 3.0
variable_ramp_fall: 1.5
variable_default_pa: 0.040
gcode:

# =========================================================================
#  ABS - Tolerates high temps, fast response OK
# =========================================================================
#  At 15mm³/s with 245°C base: 245 + (15 × 0.80) = 257°C
#
#  RECOMMENDED BASE TEMPS:
#    - Low flow (<10mm³/s): 235-240°C
#    - Medium flow (10-15mm³/s): 245-250°C
#    - High flow (15-20mm³/s): 250-255°C
# =========================================================================
[gcode_macro _AF_PROFILE_ABS]
variable_flow_k: 0.50
variable_speed_boost_k: 0.08
variable_max_boost: 18.0
variable_max_temp: 290
variable_flow_gate: 14.0
variable_flow_gate_std: 10.0
variable_pa_boost_k: 0.001
variable_ramp_rise: 3.0
variable_ramp_fall: 2.0
variable_default_pa: 0.040
gcode:

# =========================================================================
#  ASA - Similar to ABS, slightly more temp tolerant
# =========================================================================
#  At 15mm³/s with 250°C base: 250 + (15 × 0.80) = 262°C
#
#  RECOMMENDED BASE TEMPS:
#    - Low flow (<10mm³/s): 240-245°C
#    - Medium flow (10-15mm³/s): 250-255°C
#    - High flow (15-20mm³/s): 255-260°C
# =========================================================================
[gcode_macro _AF_PROFILE_ASA]
variable_flow_k: 0.50
variable_speed_boost_k: 0.08
variable_max_boost: 18.0
variable_max_temp: 295
variable_flow_gate: 14.0
variable_flow_gate_std: 10.0
variable_pa_boost_k: 0.001
variable_ramp_rise: 3.0
variable_ramp_fall: 2.0
variable_default_pa: 0.040
gcode:

# =========================================================================
#  TPU - Minimal boost, very slow ramps (heat sensitive)
# =========================================================================
#  At 8mm³/s with 220°C base: 220 + (8 × 0.20) = 221.6°C
#
#  RECOMMENDED BASE TEMPS:
#    - Low flow (<5mm³/s): 215-220°C
#    - Medium flow (5-10mm³/s): 220-225°C
#    - High flow (10-15mm³/s): 225-230°C
# =========================================================================
[gcode_macro _AF_PROFILE_TPU]
variable_flow_k: 0.20
variable_speed_boost_k: 0.02
variable_max_boost: 15.0
variable_max_temp: 240
variable_flow_gate: 8.0
variable_flow_gate_std: 5.0
variable_pa_boost_k: 0.0005
variable_ramp_rise: 1.5
variable_ramp_fall: 0.5
variable_default_pa: 0.060
gcode:

# =========================================================================
#  NYLON / PA - Hygroscopic, steady temps, moderate boost
# =========================================================================
#  At 15mm³/s with 250°C base: 250 + (15 × 0.90) = 263.5°C
#
#  RECOMMENDED BASE TEMPS:
#    - Low flow (<10mm³/s): 240-245°C
#    - Medium flow (10-15mm³/s): 250-255°C
#    - High flow (15-20mm³/s): 255-260°C
# =========================================================================
[gcode_macro _AF_PROFILE_NYLON]
variable_flow_k: 0.50
variable_speed_boost_k: 0.06
variable_max_boost: 18.0
variable_max_temp: 275
variable_flow_gate: 14.0
variable_flow_gate_std: 10.0
variable_pa_boost_k: 0.001
variable_ramp_rise: 2.5
variable_ramp_fall: 1.5
variable_default_pa: 0.040
gcode:

# =========================================================================
#  PC (Polycarbonate) - High temps, aggressive boost OK
# =========================================================================
#  At 15mm³/s with 275°C base: 275 + (15 × 0.70) = 285.5°C
#
#  RECOMMENDED BASE TEMPS:
#    - Low flow (<10mm³/s): 265-270°C
#    - Medium flow (10-15mm³/s): 275-280°C
#    - High flow (15-20mm³/s): 280-285°C
# =========================================================================
[gcode_macro _AF_PROFILE_PC]
variable_flow_k: 0.45
variable_speed_boost_k: 0.06
variable_max_boost: 18.0
variable_max_temp: 310
variable_flow_gate: 14.0
variable_flow_gate_std: 10.0
variable_pa_boost_k: 0.001
variable_ramp_rise: 3.0
variable_ramp_fall: 2.0
variable_default_pa: 0.045
gcode:

# =========================================================================
#  HIPS - Similar to ABS, support material
# =========================================================================
#  At 15mm³/s with 230°C base: 230 + (15 × 0.75) = 241.25°C
#
#  RECOMMENDED BASE TEMPS:
#    - Low flow (<10mm³/s): 220-225°C
#    - Medium flow (10-15mm³/s): 230-235°C
#    - High flow (15-20mm³/s): 235-240°C
# =========================================================================
[gcode_macro _AF_PROFILE_HIPS]
variable_flow_k: 0.50
variable_speed_boost_k: 0.06
variable_max_boost: 18.0
variable_max_temp: 250
variable_flow_gate: 14.0
variable_flow_gate_std: 10.0
variable_pa_boost_k: 0.001
variable_ramp_rise: 3.0
variable_ramp_fall: 1.5
variable_default_pa: 0.045
gcode:

# =========================================================================
#  DEFAULT - Fallback for unknown materials (conservative PLA-like)
# =========================================================================
[gcode_macro _AF_PROFILE_DEFAULT]
variable_flow_k: 0.40
variable_speed_boost_k: 0.05
variable_max_boost: 12.0
variable_max_temp: 280
variable_flow_gate: 12.0
variable_flow_gate_std: 8.0
variable_pa_boost_k: 0.001
variable_ramp_rise: 2.5
variable_ramp_fall: 1.5
variable_default_pa: 0.040
gcode:

# =========================================================================
#  INCLUDE USER MATERIAL PROFILES (protected from updates)
# =========================================================================
[include material_profiles_user.cfg]